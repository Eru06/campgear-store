# DMZ zone VM — Nginx reverse proxy + React static files
# Deploy on VM 1 (10.10.1.x)

services:
  frontend:
    image: campgear-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
