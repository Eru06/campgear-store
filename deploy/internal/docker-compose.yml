# Internal zone — E-commerce App/DB Server
# Deploy on Proxmox VM at 192.168.1.30 (Inside network 192.168.1.0/24)
# Backend port 8000 accessible from DMZ (192.168.2.10) via Palo Alto FW
# Database is isolated — only reachable from backend container via Docker network

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campgear
      POSTGRES_USER: campgear
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campgear"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: campgear-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://campgear:${DB_PASSWORD}@db:5432/campgear
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_ENV: production
      LOG_LEVEL: INFO
      UPLOAD_DIR: /data/uploads
    ports:
      # Accessible from DMZ Nginx (192.168.2.10) through Palo Alto FW
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  uploads:
